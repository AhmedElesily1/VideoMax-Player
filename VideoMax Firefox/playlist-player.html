<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Ultimate Playlist Player</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#040408;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}
#app{display:flex;height:100vh;width:100vw}
#sidebar{width:360px;max-width:42vw;background:#0a0a12;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column}
#playerWrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
#video{width:100%;height:100%;object-fit:contain;background:#000}
.header{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
.header h1{font:900 15px system-ui}
.header small{display:block;font:500 10px system-ui;color:rgba(255,255,255,.5);margin-top:2px}
.btn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:8px 12px;font:700 12px system-ui;cursor:pointer}
.btn.primary{background:#e50914;border-color:#e50914}
.list{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.item{display:flex;gap:10px;padding:8px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid transparent;cursor:pointer}
.item.active{background:rgba(229,9,20,.15);border-color:rgba(229,9,20,.35)}
.item:hover{background:rgba(255,255,255,.08)}
.thumb{width:84px;height:48px;border-radius:8px;background:#111;object-fit:cover;flex-shrink:0}
.meta{flex:1;min-width:0}
.name{font:700 12px/1.2 system-ui;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.host{font:500 10px system-ui;color:rgba(255,255,255,.5);margin-top:2px}
.controls{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top, rgba(0,0,0,.9), transparent);display:flex;flex-direction:column;gap:10px;pointer-events:auto}
.progress{height:4px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;cursor:pointer;position:relative}
.progress-fill{height:100%;background:#e50914;width:0%}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.left,.right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.cbtn{height:34px;padding:0 12px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(20,20,20,.7);color:#fff;font:700 12px system-ui;cursor:pointer}
.cbtn:hover{background:rgba(255,255,255,.12)}
.empty{padding:40px 20px;text-align:center;color:rgba(255,255,255,.5);font:600 14px system-ui}
@media(max-width:800px){
  #app{flex-direction:column}
  #sidebar{width:100%;max-width:100%;height:42vh;order:2}
  #playerWrap{order:1;height:58vh}
}
</style>
</head>
<body>
<div id="app">
  <div id="playerWrap">
    <video id="video" controls autoplay playsinline></video>
    <div class="controls" id="controls">
      <div class="progress" id="progress"><div class="progress-fill" id="pFill"></div></div>
      <div class="row">
        <div class="left">
          <button class="cbtn" id="prevBtn">⏮ Prev</button>
          <button class="cbtn primary" id="playBtn">⏸ Pause</button>
          <button class="cbtn" id="nextBtn">Next ⏭</button>
          <button class="cbtn" id="fsBtn">⛶ Fullscreen</button>
        </div>
        <div class="right">
          <button class="cbtn" id="arBtn">AR: Default</button>
          <button class="cbtn" id="speedBtn">1×</button>
          <span id="counter" style="font:700 12px system-ui;color:rgba(255,255,255,.6)">0 / 0</span>
        </div>
      </div>
    </div>
  </div>
  <div id="sidebar">
    <div class="header">
      <div><h1>📺 Playlist</h1><small>• Click to play fullscreen directly</small></div>
      <button class="btn" id="closeBtn">✕</button>
    </div>
    <div class="list" id="list"></div>
    <div style="padding:10px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px">
      <button class="btn" id="clearBtn" style="flex:1;color:#ff6666">Clear</button>
      <button class="btn primary" id="shuffleBtn" style="flex:1">🔀 Shuffle</button>
    </div>
  </div>
</div>
<script src="hls.min.js"></script>
<script src="playlist-player.js"></script>
</body>
</html>
